services:
  backend:
    image: ghcr.io/voltdispatch/backend:${TAG:-staging}
    container_name: voltdispatch-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - .env.backend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s