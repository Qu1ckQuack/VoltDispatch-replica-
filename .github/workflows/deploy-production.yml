name: Deploy Production

on:
  push:
    tags:
      - "v*.*.*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: voltdispatch/backend
  PREVIOUS_TAG: v0.0.0

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Get previous production tag
        id: prev
        run: |
          PREV=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/tags?per_page=2" \
            | jq -r '.[1].name // "v0.0.0"')
          echo "previous=$PREV" >> $GITHUB_OUTPUT

      - name: Build and push production image
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:prod

      - name: Deploy to EC2 (production)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST_BACKEND }}
          username: ${{ secrets.SSH_USER_BACKEND }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/voltdispatch
            TAG=prod docker-compose -f docker-compose.backend.yml pull
            TAG=prod docker-compose -f docker-compose.backend.yml up -d
            sleep 15
            curl -sf http://localhost:3001/health || {
              echo "Health check failed — rolling back to ${{ steps.prev.outputs.previous }}"
              docker-compose -f docker-compose.backend.yml logs --tail=50
              TAG=${{ steps.prev.outputs.previous }} docker-compose -f docker-compose.backend.yml up -d
              exit 1
            }
            echo "Prisma migrate deploy"
            docker-compose -f docker-compose.backend.yml exec -T backend npx prisma migrate deploy
            echo "Production deploy complete"