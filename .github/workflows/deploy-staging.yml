name: Deploy Staging

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: voltdispatch/backend

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging, ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST_BACKEND }}
          username: ${{ secrets.SSH_USER_BACKEND }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/voltdispatch
            TAG=staging docker-compose -f docker-compose.backend.yml pull
            TAG=staging docker-compose -f docker-compose.backend.yml up -d
            sleep 10
            curl -sf http://localhost:3001/health || {
              echo "Health check failed — rolling back"
              docker-compose -f docker-compose.backend.yml logs --tail=50
              docker-compose -f docker-compose.backend.yml up -d --no-pull
              exit 1
            }
            echo "Prisma migrate deploy"
            docker-compose -f docker-compose.backend.yml exec -T backend npx prisma migrate deploy
            echo "Staging deploy complete"